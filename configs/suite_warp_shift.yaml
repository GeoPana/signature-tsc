seed: 42
results_dir: results/suites

suite:
  name: stress_grid_v1

  datasets:
    # Clean
    - CharacterTrajectories
    - NATOPS

    # Warp grid (two decimals, consistent)
    - CharacterTrajectories@warp=0.10
    - CharacterTrajectories@warp=0.20
    - CharacterTrajectories@warp=0.40
    - CharacterTrajectories@warp=0.60

    - NATOPS@warp=0.10
    - NATOPS@warp=0.20
    - NATOPS@warp=0.40
    - NATOPS@warp=0.60

    # Shift grid (two decimals, consistent)
    - CharacterTrajectories@shift=0.05
    - CharacterTrajectories@shift=0.10
    - CharacterTrajectories@shift=0.20
    - CharacterTrajectories@shift=0.40

    - NATOPS@shift=0.05
    - NATOPS@shift=0.10
    - NATOPS@shift=0.20
    - NATOPS@shift=0.40

  variants:
    - name: minirocket
      model:
        type: minirocket
        params:
          n_kernels: 10000
          max_dilations_per_kernel: 32
          n_jobs: -1
          random_state: 42

    - name: sig_nowarp_timeFalse_L3_C1
      features:
        level: 3
        with_time: false
        window_fracs: [0.125, 0.25, 1.0]
        step_frac: 0.5
        min_window: 8
        pool: ["mean", "max"]
      model:
        type: logreg
        params:
          C: 1.0
          max_iter: 5000

    - name: sig_LL_local_L2_C0.1
      features:
        level: 2
        with_time: true
        lead_lag: true
        window_fracs: [0.05, 0.10, 0.20]
        step_frac: 0.25
        min_window: 12
        pool: ["mean", "max"]
      model:
        type: logreg
        params:
          C: 0.1
          max_iter: 5000

    - name: sig_global_L3_noTime
      features:
        level: 3
        with_time: false
        window_fracs: null
      model:
        type: logreg
        params:
          C: 1.0
          max_iter: 5000
  
  plotting:
    enabled: true
    # If this suite already focuses on one dataset, you can omit datasets.
    # Or keep explicit filter(s), e.g.:
    # datasets: [NATOPS]
