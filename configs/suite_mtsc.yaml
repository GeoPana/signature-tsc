seed: 42
results_dir: results/suites

suite:
  name: mtsc_5
  datasets:
    - BasicMotions
    - ArticularyWordRecognition
    - CharacterTrajectories
    - NATOPS
    - Epilepsy

  # Each variant is one method you want to run on each dataset.
  # The script will run: for dataset in datasets: for variant in variants: run(...)
  variants:
    - name: sig_logsig_win_L3_time
      features:
        level: 3
        with_time: true
        window_fracs: [0.125, 0.25, 1.0]
        step_frac: 0.5
        min_window: 8
        pool: ["mean", "max"]
      model:
        type: logreg
        params:
          C: 1.0
          max_iter: 5000

    - name: minirocket
      model:
        type: minirocket
        params:
          n_kernels: 10000
          max_dilations_per_kernel: 32
          n_jobs: -1
          random_state: 42

  plotting:
    enabled: true
    # optional: only plot these datasets (base or exact transformed names)
    # datasets: [NATOPS, CharacterTrajectories]
    # optional: override output dir
    # out_dir: results/custom_plots